name: Registry Mirror Sync

on:
  schedule:
    # Weekly sync: every Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      images:
        description: 'Specific images to sync (comma-separated, leave empty for all)'
        required: false
        type: string
        default: ''
  push:
    paths:
      - images.yaml
    branches:
      - main

env:
  TARGET_REGISTRY: myhome.rwecho.top:8500

jobs:
  sync:
    name: Sync Images
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq skopeo
          pip install pyyaml --quiet

      - name: Verify tools
        run: |
          skopeo --version
          python3 --version

      - name: Login to target registry
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -n "$REGISTRY_USERNAME" ] && [ -n "$REGISTRY_PASSWORD" ]; then
            echo "$REGISTRY_PASSWORD" | skopeo login \
              --username "$REGISTRY_USERNAME" \
              --password-stdin \
              "${{ env.TARGET_REGISTRY }}"
            echo "::notice::Login to ${{ env.TARGET_REGISTRY }} successful"
          else
            echo "::warning::REGISTRY_USERNAME or REGISTRY_PASSWORD not set"
          fi

      - name: Run sync script
        id: sync
        env:
          TARGET_REGISTRY: https://${{ env.TARGET_REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          chmod +x scripts/sync.sh
          if [ -z "${{ github.event.inputs.images }}" ]; then
            ./scripts/sync.sh
          else
            IMAGES_REQUESTED="${{ github.event.inputs.images }}" python3 scripts/filter_images.py
            ./scripts/sync.sh images_filtered.yaml
          fi

      - name: Send notification on failure
        if: failure()
        run: |
          echo "::error::Sync workflow failed. Check the logs for details."
