name: Registry Mirror Sync

on:
  schedule:
    # Weekly sync: every Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      images:
        description: 'Specific images to sync (comma-separated, leave empty for all)'
        required: false
        type: string
        default: ''
  push:
    paths:
      - images.yaml
    branches:
      - main

env:
  TARGET_REGISTRY: registry.myhome.rwecho.top

jobs:
  sync:
    name: Sync Images
    # NOTE: Target registry only supports IPv6 externally.
    # Self-hosted runner on nas-ruan pushes via localhost:8500 (IPv4).
    # GitHub hosted runners need IPv6 access (not supported).
    runs-on: [self-hosted, registry-mirror]
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install skopeo
        run: |
          if ! command -v skopeo &>/dev/null; then
            if command -v apt-get &>/dev/null; then
              sudo apt-get update -qq
              sudo apt-get install -y -qq skopeo
            elif command -v apk &>/dev/null; then
              apk add --no-cache skopeo
            else
              echo "::error::Cannot install skopeo - please install it manually"
              exit 1
            fi
          fi

      - name: Verify tools
        run: |
          skopeo --version
          python3 --version

      - name: Set registry URL
        id: registry
        run: |
          # Use localhost:8500 on self-hosted runner (NAS), HTTPS for external
          if curl -sf -o /dev/null http://localhost:8500/v2/ 2>/dev/null; then
            echo "url=http://localhost:8500" >> $GITHUB_OUTPUT
            echo "no_tls=true" >> $GITHUB_OUTPUT
            echo "::notice::Using local registry at http://localhost:8500"
          else
            echo "url=https://${{ env.TARGET_REGISTRY }}" >> $GITHUB_OUTPUT
            echo "no_tls=false" >> $GITHUB_OUTPUT
            echo "::notice::Using remote registry at https://${{ env.TARGET_REGISTRY }}"
          fi

      - name: Login to target registry
        if: steps.registry.outputs.url != 'http://localhost:8500'
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -n "$REGISTRY_USERNAME" ] && [ -n "$REGISTRY_PASSWORD" ]; then
            echo "$REGISTRY_PASSWORD" | skopeo login \
              --username "$REGISTRY_USERNAME" \
              --password-stdin \
              "${{ steps.registry.outputs.url }}"
            echo "::notice::Login successful"
          else
            echo "::warning::REGISTRY_USERNAME or REGISTRY_PASSWORD not set"
          fi

      - name: Run sync script
        id: sync
        env:
          TARGET_REGISTRY: ${{ steps.registry.outputs.url }}
          NO_TLS_VERIFY: ${{ steps.registry.outputs.no_tls }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          chmod +x scripts/sync.sh
          if [ -z "${{ github.event.inputs.images }}" ]; then
            ./scripts/sync.sh
          else
            python3 -c "
import yaml
with open('images.yaml') as f:
    config = yaml.safe_load(f)
images_requested = '${{ github.event.inputs.images }}'.split(',')
images_requested = [i.strip() for i in images_requested]
filtered = {'registry': config['registry'], 'images': []}
for img in config['images']:
    src = img.get('source', '')
    if any(req in src for req in images_requested):
        filtered['images'].append(img)
with open('images_filtered.yaml', 'w') as f:
    yaml.dump(filtered, f)
print(f'Filtered {len(filtered[\"images\"])} images')
"
            ./scripts/sync.sh images_filtered.yaml
          fi

      - name: Send notification on failure
        if: failure()
        run: |
          echo "::error::Sync workflow failed. Check the logs for details."
