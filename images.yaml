# Registry Mirror Configuration
# All images listed here will be synced to the target registry.

registry: myhome.rwecho.top:8500

images:
  # ===== Docker Hub Official Images =====
  - source: docker.io/library/nginx:stable-alpine
    target: library/nginx:stable-alpine
  - source: docker.io/library/nginx:stable-alpine3.21-slim
    target: library/nginx:stable-alpine3.21-slim

  - source: docker.io/library/redis:7-alpine
    target: library/redis:7-alpine

  - source: docker.io/library/postgres:16-alpine
    target: library/postgres:16-alpine

  - source: docker.io/library/mysql:8.0
    target: library/mysql:8.0

  - source: docker.io/library/mariadb:11-lts
    target: library/mariadb:11-lts

  - source: docker.io/library/alpine:3.21
    target: library/alpine:3.21

  - source: docker.io/library/ubuntu:24.04
    target: library/ubuntu:24.04

  - source: docker.io/library/python:3.13-slim
    target: library/python:3.13-slim

  - source: docker.io/library/node:22-alpine
    target: library/node:22-alpine

  - source: docker.io/library/golang:1.24-alpine
    target: library/golang:1.24-alpine

  # ===== Docker Hub Popular Projects =====
