    target: ghcr/actions-runner:latest

  # ===== Quay.io =====
  - source: quay.io/prometheus/node-exporter:latest
    target: prometheus/node-exporter:latest

  - source: quay.io/prometheus/alertmanager:latest
    target: prometheus/alertmanager:latest

  - source: quay.io/argoproj/argo-cd:latest
    target: argoproj/argo-cd:latest

  - source: quay.io/argoproj/argocli:latest
    target: argoproj/argocli:latest
