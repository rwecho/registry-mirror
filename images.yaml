    target: grafana/grafana:latest

  - source: docker.io/prom/prometheus:latest
    target: prom/prometheus:latest

  - source: docker.io/prom/alertmanager:latest
    target: prom/alertmanager:latest

  - source: docker.io/portainer/portainer-ce:latest
    target: portainer/portainer-ce:latest

  - source: docker.io/jenkins/jenkins:lts-jdk17
    target: jenkins/jenkins:lts-jdk17

  - source: docker.io/nextcloud:stable
    target: nextcloud:stable

  - source: docker.io/bitnami/redis:latest
    target: bitnami/redis:latest

  - source: docker.io/bitnami/postgresql:latest
    target: bitnami/postgresql:latest

  # ===== Kubernetes / CNCF Ecosystem =====
  - source: registry.k8s.io/kube-apiserver:v1.32.0
    target: k8s/kube-apiserver:v1.32.0
  - source: registry.k8s.io/kube-controller-manager:v1.32.0
    target: k8s/kube-controller-manager:v1.32.0
  - source: registry.k8s.io/kube-scheduler:v1.32.0
    target: k8s/kube-scheduler:v1.32.0
  - source: registry.k8s.io/kube-proxy:v1.32.0
    target: k8s/kube-proxy:v1.32.0
  - source: registry.k8s.io/coredns/coredns:v1.12.0
    target: k8s/coredns:v1.12.0
  - source: registry.k8s.io/etcd:3.5.17-0
    target: k8s/etcd:3.5.17-0
  - source: registry.k8s.io/pause:3.10
    target: k8s/pause:3.10

  - source: registry.k8s.io/ingress-nginx/controller:v1.12.0
    target: k8s/ingress-nginx-controller:v1.12.0

  - source: registry.k8s.io/metrics-server/metrics-server:v0.7.2
    target: k8s/metrics-server:v0.7.2

  # ===== Docker Hub AI/ML Images =====
  - source: docker.io/pytorch/pytorch:2.6.0-cuda12.4-cudnn9-runtime
